<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>학식</title>

  <style>
    #main-title{
      font-size : 26px;
      font-weight : bold;
      margin-top:10px;
      margin-bottom : 15px;
    }

    #title{
      font-size : 15px;
      font-weight : bold;
      color : #ff41df;
      margin-top:25px;
      margin-bottom : 25px;
    }


    button {
      margin: 5px;
      padding: 8px 12px;
      border: none;
      background: #eee;
      cursor: pointer;
      border-radius: 8px;
    }

    button.active {
      background: #ff41df;
      color: white;
      font-weight: bold;
    }

    .card {
      background: white;
      border: 1px solid #eee;
      border-radius: 12px;
      padding: 12px 14px;
      margin: 10px 0;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card h3 {
      margin: 0 0 8px 0;
    }

    .menu-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 6px 0;
      gap: 10px;
    }

    .price {
      color: #ff41df ;
      font-weight: bold;
    }

    #restaurantTabs{
      margin : 20px 0;
      border-bottom : 1px solid #ddd;
      display : flex;
      flex-wrap: wrap;
      align-items:center;
    }

    .restaurant-btn{
      background : transparent;
      border : none;
      font-size : 16px;
      font-weight : 600;
      padding : 8px 12px;
      cursor : pointer;
      color : #666;
      position : relative;

    }

    .restaurant-btn:not(:last-child)::after{
      content:"";
      position:absolute;
      right: 0;
      top: 25%;
      width : 1px;
      height: 50%;
      background : #ddd;

    }
    .restaurant-btn.active{
      background : transparent;
      color:#ff41df
    }

    .menu-set:not(:last-child){
      border-bottom:1px solid #eee;
      padding-bottom:12px;
      margin-bottom:12px;
    }
  </style>
</head>

<body>

<h1 id = "main-title"> 이번 주 학식</h1>

<div id="tabs"></div>
<div id ="title">오늘의 메뉴</div>

<div id = "restaurantTabs"></div>

<div id="app"></div>

<script>
const today = new Date();

const month = today.getMonth() + 1;
const date = today.getDate();
const dayNames = ["일","월","화","수","목","금","토"];
const todayName = dayNames[today.getDay()];

document.getElementById("title").textContent =
`${month}월 ${date}일 (${todayName}) 메뉴 !`;

fetch("./menu.json")
  .then(res => res.json())
  .then(data => {

    const app = document.getElementById("app");
    const tabs = document.getElementById("tabs");
    const restaurantTabs = document.getElementById("restaurantTabs");

    const days = ["일","월","화","수","목","금","토"];

    let selectedCategory = "학생식당";

    // ✅ 카테고리 보정 함수 (핵심)
    function normalizeCategory(dayName) {
      if (!data[dayName]) return "학생식당";

      const categories = [...new Set(
        data[dayName].map(i => i.category)
      )];

      if (categories.includes(selectedCategory)) return selectedCategory;
      if (categories.includes("학생식당")) return "학생식당";

      return categories[0] || "학생식당";
    }

    // ✅ 화면 렌더링
    function render(dayName, category) {
      app.innerHTML = "";

      if (!data[dayName]) {
        app.innerHTML = "<div class='card'>데이터 없음</div>";
        return;
      }

      const filtered = data[dayName].filter(
        item => item.category === category
      );

      filtered.forEach(item => {
        const div = document.createElement("div");
        div.classList.add("card");

        div.innerHTML = `
          <h3>${item.restaurant}</h3>
          ${(item.sets || []).map(set => `
          <div class="menu-set">
            
            ${(set.items || []).map(m =>`
              <div class="menu-item" style="padding-left:10px;">
                <span>${m}</span>
              </div>
            `).join("")}

            <div class = "price" style =" padding-left:10px; margin-top :6px;">
              ${set.price.toLocaleString()}원
            </div>

          </div>
        `).join("")}
      `;

      app.appendChild(div);
    });
  }

    // ✅ 식당 버튼 렌더
    function renderRestaurants(dayName) {
      restaurantTabs.innerHTML = "";

      if (!data[dayName]) return;

      const categories = [...new Set(
        data[dayName].map(i => i.category)
      )];

      categories.forEach(category => {
        const btn = document.createElement("button");
        btn.textContent = category;
        btn.classList.add("restaurant-btn");

        if (category === selectedCategory) {
          btn.classList.add("active");
        }

        btn.onclick = () => {
          selectedCategory = category;

          document.querySelectorAll(".restaurant-btn")
            .forEach(b => b.classList.remove("active"));

          btn.classList.add("active");

          render(dayName, selectedCategory);
        };

        restaurantTabs.appendChild(btn);
      });
    }

    // ✅ 요일 렌더
    function setDay(dayName, index) {

      // 날짜 계산
      const target = new Date();
      const diff = index - today.getDay();
      target.setDate(today.getDate() + diff);

      const m = target.getMonth() + 1;
      const d = target.getDate();

      document.getElementById("title").textContent =
        `${m}월 ${d}일 (${dayName}) 메뉴 !`;

      // active UI
      document.querySelectorAll("#tabs button")
        .forEach(b => b.classList.remove("active"));
      document.querySelectorAll("#tabs button")[index]
        ?.classList.add("active")

      // 상태 보정
      selectedCategory = normalizeCategory(dayName);

      // UI 갱신
      renderRestaurants(dayName);
      render(dayName, selectedCategory);
    }

    // ✅ 요일 버튼 생성
    days.forEach((dayName, index) => {
      const btn = document.createElement("button");
      btn.textContent = dayName;

      if (dayName === todayName) {
        btn.classList.add("active");
      }

      btn.onclick = () => setDay(dayName, index);

      tabs.appendChild(btn);
    });

    // 초기 실행
    setDay(todayName, today.getDay());

  });
</script>
</body>
</html>
